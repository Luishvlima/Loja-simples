<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Technoblade - Cadastro</title>
    <link rel="stylesheet" href="../css/login_e_cadastro.css">
</head>
<body>
<!-----------------------------------------------------------------------------    




Separação visual( Tenho problemas de visão por isso gosto de espaçamento 
e organização visual, mas se quiser pode retirar essa parte)




------------------------------------------------------------------------------->
    <header>
        <div class="logo">TECHNOBLADE</div>
        <div class="nav-links">
            <a href="../">Voltar</a>
            <a href="../login/">Entrar</a>
        </div>
    </header>
<!-----------------------------------------------------------------------------    




Separação visual( Tenho problemas de visão por isso gosto de espaçamento 
e organização visual, mas se quiser pode retirar essa parte)




------------------------------------------------------------------------------->
    <div class="container">
        <div class="caixa-formulario">
            <h2>Cadastre-se</h2>
            <p>Crie sua conta para acessar ofertas exclusivas</p>

            <form>
                <div class="campo">
                    <label>Nome</label>
                    <input type="text" placeholder="Digite seu nome completo" required>
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" placeholder="Ex: usuario123@gmail.com" required>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Crie uma senha" required>
                </div>

                <div class="campo">
                    <label>Confirmar senha</label>
                    <input type="password" placeholder="Confirme sua senha" required>
                </div>

                <button type="submit" class="btn-acao">Cadastrar</button>
            </form>

            <div class="link-rodape">
                Já tem conta? <a href="../login/">Entrar</a>
            </div>
        </div>
    </div>

</body>
</html>
