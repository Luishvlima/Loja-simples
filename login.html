<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Technoblade - Login</title>
    <link rel="stylesheet" href="css/login_e_cadastro.css">
</head>
<body>
<!-----------------------------------------------------------------------------

    <header>
        <div class="logo">TECHNOBLADE</div>
        <div class="nav-links">
            <a href="index.html">Voltar</a>
            <a href="cadastro.html">Cadastre-se</a>

<!-----------------------------------------------------------------------------    




Separação visual( Tenho problemas de visão por isso gosto de espaçamento

    <div class="container">
        <div class="caixa-formulario">
            <h2>Entrar</h2>
            <p>Acesse sua conta</p>

            <form>
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-acao">Entrar</button>
            </form>

            <div class="link-rodape">
                Não tem conta? <a href="cadastro.html">Cadastre-se</a>
            </div>
        </div>
    </div>

</body>
</html>
