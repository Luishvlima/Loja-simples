<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technoblade - Celular</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/barra_nav.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/botao.css">
  <link rel="stylesheet" href="../css/categoria.css">
  <link rel="stylesheet" href="../css/etiqueta.css">
  <link rel="stylesheet" href="../css/grade_produto.css">
  <link rel="stylesheet" href="../css/secao.css">
</head>

<body>
  <header>
    <nav class="barra-nav">
      <a href="../" class="barra-nav__logo">Technoblade</a>
      <div class="barra-nav__acoes">
        <a href="../index.html#categorias" class="botao botao--entrar">Voltar</a>
      </div>
    </nav>
  </header>

  <section class="secao" id="celular">
    <div class="secao__cabecalho">
      <h3 class="secao__titulo secao__titulo--h3">Celulares</h3>
    </div>

    <div class="grade-produtos">
      <article class="cartao-produto">
        <span class="etiqueta etiqueta--destaque etiqueta--absoluta">Novo</span>
        <div class="cartao-produto__midia">
          <span class="cartao-produto__icone">📱</span>
          <div class="cartao-produto__sobreposicao"></div>
        </div>
        <div class="cartao-produto__corpo">
          <div class="cartao-produto__categoria">Celulares</div>
          <div class="cartao-produto__nome">Smartphone Z20</div>
          <div class="cartao-produto__rodape">
            <span class="cartao-produto__preco">R$ 2.299</span>
            <span class="cartao-produto__preco cartao-produto__preco--antigo">R$ 2.899</span>
          </div>
          <span class="etiqueta etiqueta--perigo">20% off</span>
        </div>
      </article>

      <article class="cartao-produto">
        <span class="etiqueta etiqueta--destaque etiqueta--absoluta">Novo</span>
        <div class="cartao-produto__midia">
          <span class="cartao-produto__icone">📲</span>
          <div class="cartao-produto__sobreposicao"></div>
        </div>
        <div class="cartao-produto__corpo">
          <div class="cartao-produto__categoria">Celulares</div>
          <div class="cartao-produto__nome">Phone Lite</div>
          <div class="cartao-produto__rodape">
            <span class="cartao-produto__preco">R$ 1.499</span>
            <span class="cartao-produto__preco cartao-produto__preco--antigo">R$ 1.799</span>
          </div>
          <span class="etiqueta etiqueta--perigo">16% off</span>
        </div>
      </article>
    </div>
  </section>
</body>

</html>
